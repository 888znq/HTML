<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003300">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AI Compile - GitHub Sync</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000432; font-family: 'JetBrains Mono', monospace; padding-bottom: 68px; }

/* ── Split-pane layout ── */
#splitPane { position: fixed; inset: 0; bottom: 68px; display: flex; flex-direction: row; }
#editorPane { width: 0; min-width: 0; overflow: hidden; transition: width 0.25s ease; background: #0d0f2b; border-right: 2px solid #1a1f4e; flex-shrink: 0; position: relative; }
#editorPane.open { width: 50%; min-width: 280px; }
#monacoContainer { width: 100%; height: 100%; }
#previewPane { flex: 1; overflow: hidden; position: relative; }
#preview { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #000432; z-index: 1; }
#fring { position: absolute; inset: 0; z-index: 99; border: 3px solid #00ff88; box-shadow: inset 0 0 60px rgba(0, 255, 136, .12); pointer-events: none; opacity: 0; transition: opacity .5s; }
#fring.on { opacity: 1; }

/* ── Status Bar ── */
#statusBar { position: fixed; bottom: 0; left: 0; width: 100%; height: 22px; background: rgba(0, 0, 0, 0.9); border-top: 1px solid #333; z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 11px; color: #00ff88; letter-spacing: 0.5px; }

/* ── Toolbar ── */
#toolbar { position: fixed; bottom: 22px; left: 0; width: 100%; height: 46px; background: #0d0f2b; border-top: 1px solid #1a1f4e; z-index: 100; display: flex; align-items: stretch; padding: 0; gap: 0; overflow-x: auto; white-space: nowrap; box-shadow: 0 -4px 10px rgba(0,0,0,0.5); }
#toolbar::-webkit-scrollbar { height: 6px; }
#toolbar::-webkit-scrollbar-thumb { background: #6272a4; border-radius: 3px; }

button.btn, select.btn { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 255, 136, 0.3); color: #00ff88; padding: 6px 12px; border-radius: 0; font: 700 11px/1 'JetBrains Mono', monospace; flex: 1; cursor: pointer; backdrop-filter: blur(12px); outline: none; box-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.2); transition: all 0.2s ease; }
select.btn { padding: 5px 10px; }
button.btn:hover, select.btn:hover { background: rgba(0, 255, 136, 0.15); border-color: #00ff88; transform: translateY(-2px); }
button.btn:active { transform: scale(0.96); }
button.btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #888; }

/* ── Modals ── */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 8px 20px; border-radius: 20px; font: 700 11px/1 'JetBrains Mono', monospace; background: rgba(0, 0, 0, .85); border: 1px solid rgba(0, 255, 136, .4); color: #00ff88; backdrop-filter: blur(8px); z-index: 100; pointer-events: none; opacity: 0; transition: opacity .25s, transform .25s; }
#toast.show { opacity: 1; transform: translate(-50%, -5px); }
.modal-bg { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
.modal-bg.show { display: flex; }
.modal-box { background: #0d0f2b; border: 1px solid #00ff88; border-radius: 12px; width: min(92vw, 880px); max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,255,136,0.15); }
.modal-box h3 { color: #00ff88; padding: 14px 18px; border-bottom: 1px solid #1a1f4e; font-size: 13px; }
.modal-actions { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid #1a1f4e; justify-content: flex-end; }
#patchErrorBody { flex: 1; overflow-y: auto; padding: 14px 18px; font-size: 11px; color: #f8f8f2; white-space: pre-wrap; line-height: 1.6; }

/* ── Token Settings Modal ── */
#tokenModal .modal-box { border-color: #00ff88; }
#tokenModal .token-field { display: flex; flex-direction: column; gap: 5px; padding: 14px 18px; border-bottom: 1px solid #1a1f4e; }
#tokenModal label { font-size: 10px; color: #6272a4; letter-spacing: 1px; text-transform: uppercase; }
#tokenModal input { background: rgba(0,0,0,0.5); border: 1px solid #1a1f4e; border-radius: 6px; color: #f8f8f2; padding: 8px 10px; font: 12px 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s; }
#tokenModal input:focus { border-color: #00ff88; }
#tokenModal .token-status { font-size: 10px; padding: 8px 18px; color: #6272a4; }
#tokenModal .token-status.ok { color: #00ff88; }
#tokenModal .token-status.err { color: #ff5555; }
#tokenSaveBtn { background: rgba(0,255,136,0.15); border-color: #00ff88; color: #00ff88; }
#tokenSaveBtn:hover { background: rgba(0,255,136,0.3); }
#tokenClearBtn { background: rgba(255,85,85,0.1); border-color: #ff5555; color: #ff5555; }
#tokenClearBtn:hover { background: rgba(255,85,85,0.25); }

/* ── View Mode Overrides ── */
body.view-mode { padding-bottom: 0; }
body.view-mode #toolbar, 
body.view-mode #statusBar { display: none !important; }
body.view-mode #editorPane { width: 0 !important; min-width: 0 !important; border-right: none !important; }
body.view-mode #splitPane { bottom: 0; }

/* Floating Exit Button */
#exitViewBtn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  background: rgba(13, 15, 43, 0.9);
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px 18px;
  border-radius: 30px;
  font: 700 12px/1 'JetBrains Mono', monospace;
  cursor: pointer;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
  display: none;
  transition: all 0.2s ease;
}
#exitViewBtn:hover {
  background: rgba(0, 255, 136, 0.15);
  transform: translateY(-2px);
}
body.view-mode #exitViewBtn {
  display: block;
}
</style>
</head>
<body>

<script>var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } };</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<div id="splitPane">
  <div id="editorPane"><div id="monacoContainer"></div></div>
  <div id="previewPane">
    <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    <div id="fring"></div>
  </div>
</div>

<div id="toolbar">
  <select id="versionSelect" class="btn" style="border-color: #00ff88; color: #00ff88; max-width: 140px;" title="Version History">
    <option value="0">v1 (Current)</option>
  </select>
  <button id="pasteProcessBtn" class="btn" style="border-color: #00ff88; color: #00ff88;">📋 Paste Chunks</button>
  
  <input id="userPromptInput" type="text" placeholder="AI instructions..." style="background: rgba(0,0,0,0.6); border: 1px solid #00ff88; color: #f8f8f2; padding: 4px 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none; width: 160px;">
  <button id="promptBtn" class="btn" style="border-color: #00ff88; color: #00ff88;">🤖 Copy Context</button>

  <select id="toolbarRepoSelect" class="btn" style="border-color: #00ff88; color: #00ff88; max-width: 200px;">
    <option value="">⬇ Sync Repo...</option>
  </select>
  <button id="reloadReposBtn" class="btn" style="border-color: #6272a4; color: #6272a4; max-width: 46px;" title="Retry loading repos">🔄</button>
  <button id="githubPushBtn" class="btn" style="border-color: #00ff88; color: #00ff88;">⬆ Push Changes</button>
  
  <button id="enterViewBtn" class="btn" style="border-color: #00ff88; color: #00ff88; max-width: 80px;" title="Full Screen Preview">👁️ View</button>
  <button id="tokenSettingsBtn" class="btn" style="border-color: #6272a4; color: #6272a4; max-width: 46px;" title="GitHub Token Settings">🔑</button>
</div>

<div id="patchErrorModal" class="modal-bg">
  <div class="modal-box" style="border-color:#ff5555;">
    <h3>❌ Patch Failure</h3>
    <div id="patchErrorBody"></div>
    <div class="modal-actions">
      <button onclick="document.getElementById('patchErrorModal').classList.remove('show')" class="btn">Dismiss</button>
    </div>
  </div>
</div>

<!-- ── Token Settings Modal ── -->
<div id="tokenModal" class="modal-bg">
  <div class="modal-box" style="max-width:440px;">
    <h3>🔑 GitHub Token Settings</h3>
    <div class="token-field">
      <label>GitHub Username / Owner</label>
      <input id="tokenOwnerInput" type="text" placeholder="e.g. octocat" autocomplete="off" spellcheck="false">
    </div>
    <div class="token-field">
      <label>Personal Access Token (PAT)</label>
      <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    </div>
    <div class="token-field">
      <label>Default Branch</label>
      <input id="tokenBranchInput" type="text" placeholder="main" autocomplete="off" spellcheck="false">
    </div>
    <div class="token-field">
      <label>Default File Path</label>
      <input id="tokenPathInput" type="text" placeholder="index.html" autocomplete="off" spellcheck="false">
    </div>
    <div id="tokenStatusMsg" class="token-status">Token is stored only in your browser's localStorage.</div>
    <div class="modal-actions">
      <button id="tokenClearBtn" class="btn">🗑 Clear Saved</button>
      <button id="tokenVerifyBtn" class="btn" style="border-color:#6272a4;color:#6272a4;">🔍 Verify</button>
      <button id="tokenSaveBtn" class="btn">💾 Save &amp; Apply</button>
      <button onclick="document.getElementById('tokenModal').classList.remove('show')" class="btn" style="border-color:#555;color:#888;">✕ Close</button>
    </div>
  </div>
</div>

<div id="statusBar">
  <span id="statusLeft">🌐 GitHub Sync Mode</span>
  <span id="statusRight">📄 Ready</span>
</div>

<div id="toast"></div>

<!-- Floating View Mode Exit Button -->
<button id="exitViewBtn" title="Return to Editor">⬅ Exit View Mode</button>

<script>
  // ── RUNTIME CONFIG: all values from localStorage only ──
  function getToken()  { return (localStorage.getItem('gh_token')  || '').trim(); }
  function getOwner()  { return (localStorage.getItem('gh_owner')  || '').trim(); }
  function getBranch() { return (localStorage.getItem('gh_branch') || 'main').trim(); }
  function getPath()   { return (localStorage.getItem('gh_path')   || 'index.html').trim(); }

  // ── TOKEN SETTINGS MODAL ──
  function openTokenModal() {
    document.getElementById('tokenOwnerInput').value  = localStorage.getItem('gh_owner')  || '';
    document.getElementById('tokenInput').value       = localStorage.getItem('gh_token')  || '';
    document.getElementById('tokenBranchInput').value = localStorage.getItem('gh_branch') || 'main';
    document.getElementById('tokenPathInput').value   = localStorage.getItem('gh_path')   || 'index.html';
    const saved = localStorage.getItem('gh_token');
    setTokenStatus(saved ? `✅ Token saved (${saved.substring(0,10)}…). Edit fields to update.` : 'No token saved yet. Enter your details and click Save.', saved ? 'ok' : '');
    document.getElementById('tokenModal').classList.add('show');
  }

  function setTokenStatus(msg, cls) {
    const el = document.getElementById('tokenStatusMsg');
    el.textContent = msg;
    el.className = 'token-status ' + (cls || '');
  }

  document.getElementById('tokenSettingsBtn').addEventListener('click', openTokenModal);

  document.getElementById('tokenSaveBtn').addEventListener('click', () => {
    const owner  = document.getElementById('tokenOwnerInput').value.trim();
    const token  = document.getElementById('tokenInput').value.trim();
    const branch = document.getElementById('tokenBranchInput').value.trim() || 'main';
    const path   = document.getElementById('tokenPathInput').value.trim()   || 'index.html';
    if (!token) { setTokenStatus('❌ Token cannot be empty.', 'err'); return; }
    if (!owner) { setTokenStatus('❌ Owner/Username cannot be empty.', 'err'); return; }
    localStorage.setItem('gh_token',  token);
    localStorage.setItem('gh_owner',  owner);
    localStorage.setItem('gh_branch', branch);
    localStorage.setItem('gh_path',   path);
    setTokenStatus(`✅ Saved! Owner: ${owner} | Branch: ${branch}`, 'ok');
    toast('Token saved! Loading repos…');
    document.getElementById('tokenModal').classList.remove('show');
    loadToolbarRepos();
  });

  document.getElementById('tokenClearBtn').addEventListener('click', () => {
    ['gh_token','gh_owner','gh_branch','gh_path','gh_active_owner','gh_active_repo'].forEach(k => localStorage.removeItem(k));
    document.getElementById('tokenOwnerInput').value  = '';
    document.getElementById('tokenInput').value       = '';
    document.getElementById('tokenBranchInput').value = 'main';
    document.getElementById('tokenPathInput').value   = 'index.html';
    setTokenStatus('🗑 Cleared. Falling back to hardcoded values (if any).', '');
    toast('Saved token cleared.');
    loadToolbarRepos();
  });

  document.getElementById('tokenVerifyBtn').addEventListener('click', async () => {
    const token = document.getElementById('tokenInput').value.trim() || getToken();
    if (!token || token.includes('yourTokenHere')) { setTokenStatus('❌ No token to verify.', 'err'); return; }
    setTokenStatus('⏳ Verifying…', '');
    try {
      const res = await fetch('https://api.github.com/user', {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });
      const json = await res.json();
      if (res.ok) setTokenStatus(`✅ Valid! Logged in as: ${json.login}`, 'ok');
      else setTokenStatus(`❌ Invalid token: ${json.message}`, 'err');
    } catch(e) { setTokenStatus(`❌ Network error: ${e.message}`, 'err'); }
  });

  let sourceContent = '';
  let versions = [''];
  let currentVersion = 0;
  
  let monacoEditor = null;
  let monacoReady = false;
  let typingTimer;
  
  const $pv = document.getElementById('preview');
  const $toast = document.getElementById('toast');

  function toBase64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
  function fromBase64(str) { return decodeURIComponent(escape(window.atob(str))); }

  require(['vs/editor/editor.main'], function() {
    monacoEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
      value: '', language: 'html', theme: 'vs-dark', fontSize: 12, minimap: { enabled: false }, automaticLayout: true
    });
    monacoEditor.onDidChangeModelContent(() => {
      if (!monacoReady) return;
      const val = monacoEditor.getValue();
      if (val !== sourceContent) {
        sourceContent = val;
        render(sourceContent);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(saveVersion, 1200);
      }
    });
    monacoReady = true;
  });

  function toast(msg) { $toast.textContent = msg; $toast.classList.add('show'); setTimeout(() => $toast.classList.remove('show'), 2500); }
  
  function render(src) {
    const bridge = `<script>window.onerror=function(m,s,l){window.parent.postMessage({err:m},'*');};<\/script>`;
    $pv.srcdoc = bridge + src;
    document.getElementById('fring').classList.add('on');
    setTimeout(() => document.getElementById('fring').classList.remove('on'), 400);
  }

  /* ── VERSION SWITCHING SYSTEM ── */
  function saveVersion() {
    if (currentVersion < versions.length - 1) {
      versions = versions.slice(0, currentVersion + 1);
    }
    if (versions[versions.length - 1] !== sourceContent) {
      versions.push(sourceContent);
      if (versions.length > 50) versions.shift(); 
      currentVersion = versions.length - 1;
      updateVersionUI();
    }
  }

  function updateVersionUI() {
    const sel = document.getElementById('versionSelect');
    if (!sel) return;
    sel.innerHTML = '';
    versions.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `v${i + 1}${i === currentVersion ? ' (Active)' : ''}`;
      if (i === currentVersion) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  document.getElementById('versionSelect').addEventListener('change', (e) => {
    const idx = parseInt(e.target.value, 10);
    if (idx >= 0 && idx < versions.length) {
      currentVersion = idx;
      sourceContent = versions[idx];
      monacoReady = false; monacoEditor.setValue(sourceContent); monacoReady = true;
      render(sourceContent);
      updateVersionUI();
    }
  });

  /* ── ADVANCED CHUNK PARSER & MATCHER ── */
  function parseAllBlocks(text) {
    return text.split(/={3}BLOCK={3}/i).map(block => {
      const parts = block.split(/={3}SPLIT={3}/i);
      if (parts.length < 2) return null;
      // Trims only empty lines at the very start/end, preserves internal indentation
      return { 
        oldCode: parts[0].replace(/^\s*[\r\n]/, '').replace(/[\r\n]\s*$/, ''), 
        newCode: parts[1].replace(/^\s*[\r\n]/, '').replace(/[\r\n]\s*$/, '') 
      };
    }).filter(b => b !== null);
  }

  function applyPatch(parsed) {
    // 1. Try an exact string match first
    let idx = sourceContent.indexOf(parsed.oldCode);
    let matchedLength = parsed.oldCode.length;

    // 2. If exact fails, use the Whitespace-Agnostic Normalization Fallback
    if (idx === -1) {
      const stripWS = (str) => str.replace(/\s+/g, '');
      const oldNorm = stripWS(parsed.oldCode);
      const srcNorm = stripWS(sourceContent);

      const normIdx = srcNorm.indexOf(oldNorm);

      if (normIdx !== -1) {
        // We found the logical match, now map it back to original string indexes
        let currentNormIdx = 0;
        let startOriginalIdx = -1;
        let endOriginalIdx = -1;

        for (let i = 0; i < sourceContent.length; i++) {
          if (!/\s/.test(sourceContent[i])) {
            if (currentNormIdx === normIdx) startOriginalIdx = i;
            if (currentNormIdx === normIdx + oldNorm.length - 1) {
              endOriginalIdx = i + 1; // +1 to include the last character
              break;
            }
            currentNormIdx++;
          }
        }

        if (startOriginalIdx !== -1 && endOriginalIdx !== -1) {
          idx = startOriginalIdx;
          matchedLength = endOriginalIdx - startOriginalIdx;
        }
      }
    }

    // 3. If both fail, error out.
    if (idx === -1) {
      document.getElementById('patchErrorBody').textContent = `Match Failed. Ensure AI provided unique context lines.\n\nTarget Block:\n${parsed.oldCode}`;
      document.getElementById('patchErrorModal').classList.add('show');
      return false;
    }

    // Apply the patch
    sourceContent = sourceContent.slice(0, idx) + parsed.newCode + sourceContent.slice(idx + matchedLength);
    saveVersion(); 
    monacoReady = false; monacoEditor.setValue(sourceContent); monacoReady = true;
    render(sourceContent);
    return true;
  }

  document.getElementById('pasteProcessBtn').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      const blocks = parseAllBlocks(text);
      if (blocks.length > 0) {
        let successCount = 0;
        blocks.forEach(b => { if(applyPatch(b)) successCount++; });
        toast(`Applied ${successCount}/${blocks.length} chunk(s)`);
      } else { toast("No valid blocks found"); }
    } catch(e) { toast("Clipboard access denied"); }
  });

  /* ── AI CONTEXT GENERATION ── */
  // Updated prompt with forced context guardrails
  const SUPER_PROMPT = `[AI INSTRUCTION: Provide results in "Combined Block Split" format. 
Structure:
<exact old code to replace>
===SPLIT===
<new replacement code>

Separate multiple edits with ===BLOCK===.
CRITICAL: Do NOT output the literal labels "[OLD CODE]" or "[NEW CODE]". Output ONLY the raw code separated by the exact delimiters.
CRITICAL: The old code snippet MUST include at least 2 lines of unchanged surrounding context above and below the edit to ensure a unique mathematical match.
CRITICAL: NEVER use Non-Breaking Spaces (U+00A0). Use strictly standard spaces (U+0020) for all formatting and indentation.
Ignore indentation differences. Provide code only.]`;

  document.getElementById('promptBtn').addEventListener('click', async () => {
    const instruction = document.getElementById('userPromptInput').value.trim();
    const payload = `USER TASK: ${instruction}\n\nSOURCE:\n\`\`\`html\n${sourceContent}\n\`\`\`\n\n${SUPER_PROMPT}`;
    await navigator.clipboard.writeText(payload);
    toast("AI Context Ready!");
  });

  /* ── GITHUB CORE ── */
  async function ghApi(method, endpoint, body = null) {
    const token = getToken();
    if (!token) throw new Error("No token set — click 🔑 to add your GitHub token.");
    const owner  = localStorage.getItem('gh_active_owner') || getOwner();
    const repo   = localStorage.getItem('gh_active_repo');
    if (!repo) throw new Error("No repo selected.");
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${endpoint}?ref=${getBranch()}`;
    const res = await fetch(url, {
      method,
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' },
      body: body ? JSON.stringify(body) : null
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message);
    return json;
  }

  async function loadToolbarRepos() {
    const token = getToken();
    const sel = document.getElementById('toolbarRepoSelect');
    if (!token) {
      sel.innerHTML = '<option value="">🔑 Click 🔑 to set token</option>';
      return;
    }
    sel.innerHTML = '<option value="">⏳ Loading repos…</option>';
    try {
      // NOTE: No Cache-Control header — it triggers a CORS preflight that GitHub blocks
      const res = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated&timestamp=' + Date.now(), {
        method: 'GET',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });
      if (!res.ok) {
        let msg = 'HTTP ' + res.status;
        try { const j = await res.json(); msg += ': ' + (j.message || JSON.stringify(j)); } catch(_){}
        if (res.status === 401) msg = 'Token invalid or expired — open 🔑 and re-enter your PAT';
        if (res.status === 403) msg = 'Token lacks repo scope — regenerate with repo permissions';
        throw new Error(msg);
      }
      const repos = await res.json();
      if (!Array.isArray(repos) || repos.length === 0) {
        sel.innerHTML = '<option value="">No repos found for this token</option>';
        return;
      }
      sel.innerHTML = '<option value="">⬇ Sync Repo...</option>' +
        repos.map(r => '<option value="' + r.owner.login + '/' + r.name + '">' + r.name + '</option>').join('');
      document.getElementById('statusLeft').textContent = '🌐 GitHub: ' + getOwner();
      toast('✅ Loaded ' + repos.length + ' repos');
    } catch(e) {
      console.error('GitHub loadToolbarRepos error:', e);
      const isNetworkErr = e.message === 'Failed to fetch' || e.name === 'TypeError';
      sel.innerHTML = '<option value="">' + (isNetworkErr
        ? '❌ Network error — check internet / token scope'
        : '❌ ' + e.message) + '</option>';
    }
  }

  document.getElementById('toolbarRepoSelect').addEventListener('change', async (e) => {
    if (!e.target.value) return;
    const [owner, repo] = e.target.value.split('/');
    localStorage.setItem('gh_active_owner', owner);
    localStorage.setItem('gh_active_repo', repo);
    
    try {
      toast(`Syncing ${getPath()}...`);
      const data = await ghApi('GET', getPath());
      sourceContent = fromBase64(data.content.replace(/\n/g, ''));
      
      versions = [sourceContent];
      currentVersion = 0;
      updateVersionUI();

      monacoReady = false; monacoEditor.setValue(sourceContent); monacoReady = true;
      render(sourceContent);
      document.getElementById('statusRight').textContent = `📄 ${repo}/${getPath()}`;
    } catch(err) { toast(`Sync Failed: ${err.message}`); }
  });

  document.getElementById('githubPushBtn').addEventListener('click', async () => {
    try {
      const meta = await ghApi('GET', getPath());
      const payload = { message: "AI Update", content: toBase64(sourceContent), sha: meta.sha };
      await ghApi('PUT', getPath(), payload);
      toast("Pushed successfully!");
    } catch(e) { toast(`Push Error: ${e.message}`); }
  });

  document.getElementById('reloadReposBtn').addEventListener('click', () => {
    toast('Reloading repos…');
    loadToolbarRepos();
  });

  /* ── VIEW MODE TOGGLE ── */
  document.getElementById('enterViewBtn').addEventListener('click', () => {
    document.body.classList.add('view-mode');
    toast('View Mode active');
  });

  document.getElementById('exitViewBtn').addEventListener('click', () => {
    document.body.classList.remove('view-mode');
    // Using a slight delay to ensure Monaco resizes AFTER the CSS width transition finishes
    if (monacoEditor) {
      setTimeout(() => monacoEditor.layout(), 260); 
    }
  });

  setTimeout(loadToolbarRepos, 500);

  /* ── PWA SERVICE WORKER REGISTRATION ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered!', reg))
        .catch(err => console.log('Service Worker failed:', err));
    });
  }
</script>
</body>
</html>
